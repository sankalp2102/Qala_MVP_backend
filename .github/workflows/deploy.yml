name: Deploy to VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e

            # ── Pull latest code ──────────────────────────────────────
            cd /home/tech/qala-backend
            git pull origin main

            # ── Write .env from GitHub Secrets ───────────────────────
            cat > .env << ENVEOF
DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
DJANGO_DEBUG=False
DJANGO_ALLOWED_HOSTS=34.169.72.66,localhost

DB_NAME=qala_db
DB_USER=qala_user
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
DB_HOST=django_db
DB_PORT=5432

SUPERTOKENS_URL=http://supertokens:3567
SUPERTOKENS_API_KEY=${{ secrets.SUPERTOKENS_API_KEY }}
SUPERTOKENS_APP_NAME=Qala
SUPERTOKENS_API_DOMAIN=http://34.169.72.66
SUPERTOKENS_WEBSITE_DOMAIN=http://34.169.72.66

SUPERTOKENS_HOOK_SECRET=${{ secrets.SUPERTOKENS_HOOK_SECRET }}
CORS_ALLOWED_ORIGINS=http://34.169.72.66
ENVEOF

            # ── Rebuild & restart Django container only ───────────────
            docker compose build django
            docker compose up -d django

            # ── Run migrations ────────────────────────────────────────
            sleep 5
            docker compose exec -T django python manage.py migrate --noinput
            docker compose exec -T django python manage.py collectstatic --noinput

            echo "✅ Deploy complete"
          ENDSSH
